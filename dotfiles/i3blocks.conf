separator_block_width=15
markup=none

[cpu_usage]
label=CPU 💻 
command=top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1"%"}'
interval=10

[weather]
command=~/.i3/weather.sh
interval=1800
color=#FFFFFF

# Rede (IP Local) - Coloquei antes do iface para garantir
[ip]
command=hostname -I | awk '{print $1}'
interval=60
label=IP 🌐: 

# Interface de Rede (Substituindo o [iface] que dava erro)
[network]
command=ip route get 1.1.1.1 | awk '{print $5; exit}'
interval=10
color=#00FF00
label=NET: 

# Bateria (Comando manual para evitar erro do script interno)
[battery]
command=acpi -b | awk -F', ' '{print $2}'
interval=30
label=BAT🔋: 

# Memória RAM
[memory]
command=free -h | awk 'NR==2 {print $3 "/" $2}'
interval=5
label=RAM 💾: 

# Disco (Adicionado como você pediu)
[disk]
command=df -h / | awk 'NR==2 {print $3 "/" $2}'
interval=30
label=DISK 💽: 

[volume]
label=VOL 🔊 
command=amixer get Master | grep -Po '\[\d+%\]' | head -1
interval=1
signal=10
color=#f3f4f5

[time]
command=date '+%Y-%m-%d %H:%M:%S'
interval=5
